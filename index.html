<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Self-Check</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🩺 Health Self-Check</h1>
    <p>Quick, private BMI check with a personalized recommendation.</p>
  </header>

  <main>
    <section class="form-card">
      <form id="bmiForm" novalidate>
        <div class="field">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Juan Dela Cruz" required>
        </div>

        <div class="field">
          <label for="age">Age</label>
          <input type="number" id="age" min="1" max="120" placeholder="e.g. 21" required>
        </div>

        <div class="field">
          <label for="sex">Sex</label>
          <select id="sex" required>
            <option value="">Select</option>
            <option value="Female">Female</option>
            <option value="Male">Male</option>
          </select>
        </div>

        <div class="field">
          <label for="weight">Weight (kg)</label>
          <input type="number" id="weight" min="1" step="0.1" placeholder="e.g. 60" required>
        </div>

        <div class="field">
          <label for="height">Height (cm)</label>
          <input type="number" id="height" min="1" step="0.1" placeholder="e.g. 165" required>
        </div>

        <p id="formError" class="form-error hidden"></p>

        <button type="submit">Check My BMI</button>
      </form>
    </section>

    <section id="resultCard" class="result-card hidden">
      <h2 id="resultTitle"></h2>
      <p id="resultBmi"></p>
      <p id="resultMessage"></p>
    </section>

    <section class="history-card">
      <h2>Recent Submissions</h2>
      <ul id="historyList"></ul>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Health Self-Check — For informational purposes only. Consult a professional for medical advice.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
